name: Terraform Deploy
run-name: ${{ github.actor }} iniciou o deploy

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  codevalidate:
    name: Verifica o código Terraform
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: ./Terraform
        run: terraform init -backend=false

      - name: Terraform Validate
        working-directory: ./Terraform
        run: terraform validate

  security_scan:
    name: Análise de Segurança (tfsec)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Rodar tfsec
        uses: aquasecurity/tfsec-action@v1.0.0
        with:
          working_directory: ./Terraform

  infraestrutura:
    name: Planejamento e aplicação da infraestrutura
    runs-on: ubuntu-latest
    needs: [codevalidate, security_scan]
    env:
      TF_VAR_bloco_ips_liberados: ${{ secrets.IPS_PERMITIDOS }}
      TF_VAR_ssm_instance_profile_name: ${{ secrets.SSM_PROFILE_NAME }}
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Criar arquivo de backend
        working-directory: ./Terraform
        run: |
          cat <<EOF > backend-config.tfvars
          ${{ secrets.BACKEND_CONFIG }}
          EOF

      - name: Terraform Init
        working-directory: ./Terraform
        run: terraform init -backend-config="backend-config.tfvars"

      - name: Terraform Plan
        working-directory: ./Terraform
        run: terraform plan -out devops_challenge

      - name: Terraform Apply
        working-directory: ./Terraform
        run: terraform apply devops_challenge -auto-approve